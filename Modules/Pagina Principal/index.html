    <!-- CSS Links -->
    <link rel="stylesheet" href="../../Styles/Variables.css">

</head>
<body>
    <!-- Background Image -->
    <div class="bg-image"></div>

    <!-- Main Content -->
    <main class="container">
        <!-- Hero Section -->
        <section class="hero-section glass-card">
            <!-- Circular Logo -->
            <img src="../../Styles/Images/Logo.webp" alt="Lotus O.o Logo" class="circular-logo" width="150" height="150">
            
            <h1 class="text-gradient hero-title">Lotus O.o</h1>
            <p class="hero-subtitle">
                Join the Community and Enjoy the Best Content.
            </p>

            <!-- Social Links -->
            <div class="social-links">
                <a href="https://www.youtube.com/@Lotus_2003" target="_blank" rel="noopener noreferrer" class="social-btn btn-yt">
                    <img src="../../Styles/Images/YT.svg" alt="YouTube" style="width: 20px; height: 20px; margin-right: 8px; filter: brightness(0) invert(1);"> YouTube
                </a>
                <a href="https://www.tiktok.com/@lotuso.o?_r=1&_t=ZT-985N750lvfK" target="_blank" rel="noopener noreferrer" class="social-btn btn-tiktok">
                    <img src="../../Styles/Images/TT.svg" alt="TikTok" style="width: 20px; height: 20px; margin-right: 8px; filter: brightness(0) invert(1);"> TikTok
                </a>
                <a href="https://www.instagram.com/lotus.o.o?igsh=MW02ZXBoM3pjb2ttMA==" target="_blank" rel="noopener noreferrer" class="social-btn btn-ig">
                    <img src="../../Styles/Images/INS.svg" alt="Instagram" style="width: 20px; height: 20px; margin-right: 8px; filter: brightness(0) invert(1);"> Instagram
                </a>
            </div>
        </section>

        <!-- Dynamic Content Section -->
        <section class="content-section">
            <h2 class="text-gradient" style="text-align: center; font-size: 2.5rem; margin-bottom: 20px;">Latest Videos</h2>
            <div class="grid-layout" id="videos-grid">
               <!-- Loading Spinner -->
               <div id="loading-spinner" style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); padding: 40px 0;">
                   <div style="width: 40px; height: 40px; border: 4px solid rgba(102, 252, 241, 0.1); border-top-color: var(--accent-neon); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;"></div>
                   <p style="font-size: 1.1rem; animation: subtitle-glow 2s infinite alternate ease-in-out;">Loading videos...</p>
               </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Lotus O.o. All rights reserved.</p>
    </footer>

    
    <template id="video-card-template">
        <a href="" target="_blank" rel="noopener noreferrer" class="glass-card video-card">
            <div class="recommended-badge">Recommended</div>
            <div class="video-thumb-container">
                <img src="" alt="" class="video-thumb">
            </div>
            <h3 class="video-title"></h3>
            <span class="social-btn btn-yt btn-ver-video"><img src="../../Styles/Images/YT.svg" alt="YouTube" style="width: 16px; height: 16px; margin-right: 6px; filter: brightness(0) invert(1);"> Watch Video</span>
        </a>
    </template>
